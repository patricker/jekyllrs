name: Rust Bridge CI

on:
  push:
    branches:
      - master
      - "*-stable"
  pull_request:
    branches:
      - master
      - "*-stable"

jobs:
  rust-tests:
    name: "Rust-backed tests (Ruby ${{ matrix.ruby }} on ${{ matrix.os }})"
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        ruby: ["3.1", "3.3", "3.4"]
        exclude:
          # Reduce CI load: only test Ruby 3.3 on macOS/Windows
          - os: macos-latest
            ruby: "3.1"
          - os: macos-latest
            ruby: "3.4"
          - os: windows-latest
            ruby: "3.1"
          - os: windows-latest
            ruby: "3.4"
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: actions/cache@v4
        with:
          path: |
            rust/target
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-${{ hashFiles('rust/**/Cargo.lock', 'rust/**/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: "Set up Ruby ${{ matrix.ruby }}"
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby }}
          bundler-cache: true

      - name: Build Rust native library
        shell: bash
        run: |
          bash script/rust-build

      - name: Run Ruby unit tests with Rust
        shell: bash
        run: |
          bundle exec rake rust:test

      - name: Run full Cucumber suite
        shell: bash
        run: |
          bash script/cucumber --color

      - name: Generate and Build a new site
        shell: bash
        run: |
          bash script/default-site
