name: Rust Bridge CI

on:
  push:
    branches:
      - master
      - "*-stable"
  pull_request:
    branches:
      - master
      - "*-stable"

jobs:
  rust-tests:
    name: "Rust-backed tests (${{ matrix.os }})"
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Set up Ruby 3.3
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true

      - name: Build Rust native library
        shell: bash
        run: |
          bash script/rust-build

      - name: Run Ruby unit tests with Rust
        shell: bash
        run: |
          bundle exec rake rust:test

      - name: Run curated Cucumber features
        shell: bash
        run: |
          script/cucumber \
            features/rendering.feature:1 \
            features/post_excerpts.feature:1 \
            features/markdown.feature:1 \
            features/collections.feature:598

